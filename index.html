<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Slasher | News & Cards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --dark: #222; --gray: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #f0f0f0; color: var(--dark); }

        /* Navigation */
        header { background: #fff; padding: 15px 5%; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--red); font-size: 1.5rem; }
        .logo img { width: 45px; height: 45px; }

        /* Search Bubble */
        .search-container { background: var(--gray); border-radius: 50px; display: flex; align-items: center; padding: 5px 20px; width: 100%; max-width: 400px; border: 2px solid transparent; }
        .search-container:focus-within { border-color: var(--red); background: #fff; }
        .search-container input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; font-size: 1rem; }
        .search-container button { border: none; background: transparent; cursor: pointer; color: var(--red); font-size: 1.2rem; }

        /* Grid */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { margin-bottom: 25px; border-left: 5px solid var(--red); padding-left: 15px; font-size: 1.5rem; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* Bubble Card Style */
        .card { background: #fff; border-radius: 25px; overflow: hidden; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .card-img-top { width: 100%; height: 200px; overflow: hidden; background: #eee; }
        .card-img-top img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img-top img { scale: 1.1; }
        .card-body { padding: 20px; flex-grow: 1; border-top: 1px solid #eee; }
        .tag { font-size: 0.7rem; font-weight: bold; color: var(--red); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-body h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .card-body p { font-size: 0.9rem; color: #666; line-height: 1.4; }

        /* Modal Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 800px; border-radius: 30px; display: flex; flex-wrap: wrap; position: relative; overflow: hidden; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: #000; z-index: 10; }
        .modal-img { flex: 1; min-width: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-img img { max-width: 100%; max-height: 400px; border-radius: 15px; }
        .modal-info { flex: 1; padding: 40px; min-width: 300px; }
        .stat-list { margin-top: 20px; }
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .stat-label { font-weight: bold; color: #888; }

        footer { text-align: center; padding: 40px; background: var(--dark); color: #fff; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu">
                <span>Pokemon Slasher</span>
            </div>
            <div class="search-container">
                <input type="text" id="userInput" placeholder="Search Pokemon (e.g. Mewtwo)...">
                <button onclick="handleSearch()"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <main>
        <h2 class="section-title" id="title">Recent Pokemon News</h2>
        <div class="news-grid" id="grid"></div>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-img"><img id="m-img" src=""></div>
            <div class="modal-info" id="m-info"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Pokemon Slasher | Copyright harshj58</p>
    </footer>

    <script>
        // REAL NEWS DATA
        const newsItems = [
            { id: 'n1', title: "Pokemon Worlds 2026", tag: "Events", desc: "London prepares for the biggest Pokemon championship ever recorded.", img: "https://images.unsplash.com/photo-1613771404721-1f92d799e49f?auto=format&fit=crop&w=800", long: "The 2026 World Championships will feature a massive 2 million dollar prize pool. Fans can expect exclusive pop-up shops and new game reveals." },
            { id: 'n2', title: "New TCG: Primal Roar", tag: "TCG News", desc: "A first look at the new Primal cards hitting stores this October.", img: "https://images.unsplash.com/photo-1627323567032-a7783134179d?auto=format&fit=crop&w=800", long: "Primal Roar introduces a new 'Ancient' mechanic that allows Pokemon to use attacks from their previous evolutions. Pre-orders start next week." },
            { id: 'n3', title: "Pokemon GO Wild Area", tag: "App Update", desc: "Trainers can now explore huge Wild Areas in major cities worldwide.", img: "https://images.unsplash.com/photo-1605973029521-8154a01987b4?auto=format&fit=crop&w=800", long: "The Wild Area update brings Max Raid battles to the real world. Players must team up in person to take down Gigantamax Gengar." }
        ];

        let searchResult = null;

        function displayHome() {
            const grid = document.getElementById('grid');
            grid.innerHTML = newsItems.map(item => `
                <div class="card" onclick="openModal('${item.id}', true)">
                    <div class="card-img-top"><img src="${item.img}"></div>
                    <div class="card-body">
                        <span class="tag">${item.tag}</span>
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        async function handleSearch() {
            const query = document.getElementById('userInput').value.toLowerCase().trim();
            if(!query) return displayHome();

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
                if(!res.ok) throw new Error();
                const data = await res.json();
                searchResult = data;
                
                document.getElementById('title').innerText = "Search Result";
                document.getElementById('grid').innerHTML = `
                    <div class="card" onclick="openModal('${data.name}', false)">
                        <div class="card-img-top" style="background:white; padding:20px;">
                            <img src="${data.sprites.other['official-artwork'].front_default}" style="object-fit:contain">
                        </div>
                        <div class="card-body">
                            <span class="tag">Database Card</span>
                            <h3 style="text-transform:capitalize">${data.name}</h3>
                            <p>Click to see HP, Weight, and Stats.</p>
                        </div>
                    </div>
                `;
            } catch {
                alert("Pokemon not found! Try 'Pikachu' or 'Rayquaza'");
            }
        }

        function openModal(key, isNews) {
            const modal = document.getElementById('modal');
            const info = document.getElementById('m-info');
            const img = document.getElementById('m-img');

            if(isNews) {
                const item = newsItems.find(n => n.id === key);
                img.src = item.img;
                info.innerHTML = `<h2>${item.title}</h2><p style="margin-top:20px; line-height:1.6; color:#444;">${item.long}</p>`;
            } else {
                img.src = searchResult.sprites.other['official-artwork'].front_default;
                info.innerHTML = `
                    <h2 style="text-transform:capitalize">${searchResult.name}</h2>
                    <div class="stat-list">
                        <div class="stat-item"><span class="stat-label">HP</span><span>${searchResult.stats[0].base_stat}</span></div>
                        <div class="stat-item"><span class="stat-label">Attack</span><span>${searchResult.stats[1].base_stat}</span></div>
                        <div class="stat-item"><span class="stat-label">Defense</span><span>${searchResult.stats[2].base_stat}</span></div>
                        <div class="stat-item"><span class="stat-label">Weight</span><span>${searchResult.weight / 10} kg</span></div>
                        <div class="stat-item"><span class="stat-label">Type</span><span style="text-transform:capitalize">${searchResult.types.map(t => t.type.name).join(', ')}</span></div>
                    </div>
                `;
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeModal(); }
        
        displayHome();
    </script>
</body>
</html>
